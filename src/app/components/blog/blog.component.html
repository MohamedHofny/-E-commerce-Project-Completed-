<div class="blog-hero">
  <h1>Our Blog</h1>
  <p>Tips, trends, and inspiration for your home</p>
</div>

<div class="container py-5">
  <div class="row">
    @for(blog of blogs; track blog.id){
      <div class="col-md-4 mb-4">
        <div class="blog-card">
          <img [src]="blog.imgURL" [alt]="blog.title">
          <div class="blog-content">
            <span class="blog-tag">{{blog.category}}</span>
            <h5 class="fw-bold mt-2">{{blog.title}}</h5>
            <p class="text-muted">{{blog.description}}</p>
            <div class="blog-footer">
              <span>🗓️ {{blog.date}}</span>
              <a [routerLink]="['/blog', blog.id]" class="btn btn-sm btn-dark">Read More</a>
            </div>
          </div>
        </div>
      </div>
    }
  </div>
</div>
