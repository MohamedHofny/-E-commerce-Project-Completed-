<div class="contact-hero">
  <h1>Contact Us</h1>
  <p>We'd love to hear from you!</p>
</div>

<div class="container py-5">
  <div class="row">
    <div class="col-md-6 mb-4">
      <h2 class="fw-bold mb-4">Get In Touch</h2>
      @if(successMessage){
        <div class="alert alert-success">✅ {{successMessage}}</div>
      }
      <div class="mb-3">
        <label class="form-label fw-bold">Your Name</label>
        <input type="text" class="form-control" placeholder="Enter your name" [(ngModel)]="name">
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Email Address</label>
        <input type="email" class="form-control" placeholder="Enter your email" [(ngModel)]="email">
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Message</label>
        <textarea class="form-control" rows="5" placeholder="Write your message here..." [(ngModel)]="message"></textarea>
      </div>
      <button class="btn btn-dark w-100" (click)="handleSubmit()">Send Message</button>
    </div>

    <div class="col-md-6 mb-4">
      <h2 class="fw-bold mb-4">Contact Info</h2>
      <div class="info-card">
        <div class="info-item">
          <span class="info-icon">📧</span>
          <div>
            <h6 class="fw-bold">Email</h6>
            <p class="text-muted">info&#64;furniturefixture.com</p>
          </div>
        </div>
        <div class="info-item">
          <span class="info-icon">📞</span>
          <div>
            <h6 class="fw-bold">Phone</h6>
            <p class="text-muted">+1 234 567 890</p>
          </div>
        </div>
        <div class="info-item">
          <span class="info-icon">📍</span>
          <div>
            <h6 class="fw-bold">Address</h6>
            <p class="text-muted">123 Furniture St, Cairo, Egypt</p>
          </div>
        </div>
        <div class="info-item">
          <span class="info-icon">🕐</span>
          <div>
            <h6 class="fw-bold">Working Hours</h6>
            <p class="text-muted">Mon - Fri: 9:00 AM - 6:00 PM</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
